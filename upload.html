<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영남고 시간표 업로드 도구</title>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(registrations) {
    for(let registration of registrations) {
      registration.unregister();
    }
  });
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f4f3; color: #222; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 20px 50px -15px rgba(0,0,0,0.3); max-width: 560px; width: 100%; padding: 36px 32px; }
  h1 { font-size: 18px; font-weight: 900; color: #2F5D62; margin-bottom: 6px; }
  .subtitle { font-size: 12.5px; color: #666; margin-bottom: 28px; line-height: 1.6; }
  .step-box { background-color: #f8faf9; border: 1px solid #e4ebe9; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
  .step-title { font-size: 13px; font-weight: 700; color: #2F5D62; margin-bottom: 12px; display: flex; align-items: center; }
  .step-title span { background-color: #2F5D62; color: #fff; font-size: 10px; width: 16px; height: 16px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-right: 6px; }
  .btn { display: block; width: 100%; background-color: #2F5D62; color: #fff; border: none; padding: 12px; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
  .btn:hover { background-color: #1E3D40; }
  .btn:disabled { background-color: #ccc; cursor: not-allowed; }
  .file-label { display: block; border: 2px dashed #b5c7c4; padding: 24px; text-align: center; border-radius: 6px; cursor: pointer; background-color: #fff; transition: background 0.2s; }
  .file-label:hover { background-color: #f0f5f4; }
  .file-label input { display: none; }
  .file-info { margin-top: 8px; font-size: 12px; color: #555; font-weight: 700; }
  #status { margin-top: 20px; padding: 14px; border-radius: 6px; font-size: 12.5px; line-height: 1.6; white-space: pre-wrap; display: none; }
  .status-info { background-color: #eaf4f5; border: 1px solid #bce1e4; color: #2c5e61; }
  .status-err { background-color: #fdf2f2; border: 1px solid #fbc4c4; color: #9b2c2c; }
  .user-info { font-size: 12px; color: #666; margin-top: -16px; margin-bottom: 24px; text-align: right; }
</style>
</head>
<body>

<div class="card">
  <h1>영남고 시간표 데이터 업로드</h1>
  <div class="subtitle">엑셀 파일(.xlsx)을 선택하여 Firestore에 통합 데이터를 업로드합니다.</div>
  
  <div class="user-info" id="userInfo">확인 중...</div>

  <div class="step-box" id="loginBox">
    <div class="step-title"><span>0</span> 관리자 인증</div>
    <button class="btn" id="loginBtn">Google 계정으로 로그인</button>
    <button class="btn" id="logoutBtn" style="display:none; background-color:#888;">로그아웃</button>
  </div>

  <div class="step-box">
    <div class="step-title"><span>1</span> 엑셀 템플릿 파일 선택</div>
    <label class="file-label">
      <span style="font-size:13px; color:#666;">컴퓨터에서 파일 선택 (.xlsx)</span>
      <input type="file" id="excelFile" accept=".xlsx">
      <div class="file-info" id="fileName">선택된 파일 없음</div>
    </label>
  </div>

  <button class="btn" id="uploadBtn" disabled>Firestore에 업로드 실행</button>

  <div id="status"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// [주의] 프로젝트 관리를 위해 본인의 기존 firebaseConfig 환경 변수를 그대로 사용하십시오.
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const userInfo = document.getElementById('userInfo');
const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const excelFile = document.getElementById('excelFile');
const fileName = document.getElementById('fileName');
const uploadBtn = document.getElementById('uploadBtn');
const statusDiv = document.getElementById('status');

let currentUser = null;
let parsedData = null;

function setStatus(msg, type) {
  statusDiv.style.display = 'block';
  statusDiv.className = type === 'err' ? 'status-err' : 'status-info';
  statusDiv.innerText = msg;
}

// 기존 로그인/로그아웃 버튼 기능 원상복구
loginBtn.addEventListener('click', async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (err) {
    console.error(err);
    setStatus('로그인 실패: ' + err.message, 'err');
  }
});

logoutBtn.addEventListener('click', async () => {
  try {
    await signOut(auth);
    setStatus('로그아웃되었습니다.', 'info');
  } catch (err) {
    console.error(err);
  }
});

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    userInfo.innerText = "접속 계정: " + user.email;
    loginBtn.style.display = 'none';
    logoutBtn.style.display = 'block';
    if (parsedData) uploadBtn.disabled = false;
  } else {
    currentUser = null;
    userInfo.innerText = "로그인 되지 않음";
    loginBtn.style.display = 'block';
    logoutBtn.style.display = 'none';
    uploadBtn.disabled = true;
  }
});

excelFile.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  fileName.innerText = file.name;
  uploadBtn.disabled = true;
  setStatus('엑셀 파일을 해석하는 중...', 'info');

  try {
    parsedData = await parseExcel(file);
    setStatus("파일 해석 성공!\n업로드 준비가 완료되었습니다.", 'info');
    if (currentUser) uploadBtn.disabled = false;
  } catch (err) {
    console.error(err);
    parsedData = null;
    setStatus("파일 해석 실패:\n" + err.message, 'err');
  }
});

function parseExcel(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, {type: 'array'});
        const sheetNames = wb.SheetNames;

        // [에러 수정] 순서(인덱스) 대신 시트 이름에 명칭이 포함되어 있는지 찾아 할당합니다.
        const tsName = sheetNames.find(n => n.includes('전체시간표'));
        const extName = sheetNames.find(n => n.includes('내선번호'));
        const bellName = sheetNames.find(n => n.includes('시정표'));
        const electiveName = sheetNames.find(n => n.includes('묶음선택과목'));

        if (!tsName) throw new Error("엑셀 파일에서 '전체시간표' 탭을 찾을 수 없습니다.");
        if (!extName) throw new Error("엑셀 파일에서 '내선번호' 탭을 찾을 수 없습니다.");
        if (!bellName) throw new Error("엑셀 파일에서 '시정표' 탭을 찾을 수 없습니다.");
        if (!electiveName) throw new Error("엑셀 파일에서 '묶음선택과목' 탭을 찾을 수 없습니다.");

        const sheet1 = wb.Sheets[tsName];
        const sheet2 = wb.Sheets[extName];
        const sheet3 = wb.Sheets[bellName];
        const sheet4 = wb.Sheets[electiveName];

        const rows1 = XLSX.utils.sheet_to_json(sheet1, {header: 1});
        const rows2 = XLSX.utils.sheet_to_json(sheet2, {header: 1});
        const rows3 = XLSX.utils.sheet_to_json(sheet3, {header: 1});
        const rows4 = XLSX.utils.sheet_to_json(sheet4, {header: 1});

        // 1. 전체시간표 처리
        const teachers = [];
        let headerIdx = -1;
        for (let i = 0; i < rows1.length; i++) {
          if (rows1[i] && rows1[i].includes('교사명')) {
            headerIdx = i;
            break;
          }
        }
        if (headerIdx === -1) headerIdx = 1;

        const days = ['월', '화', '수', '목', '금'];
        for (let ri = headerIdx + 1; ri < rows1.length; ri++) {
          const r = rows1[ri];
          if (!r || !r[1]) continue;
          const tname = r[1].toString().trim();
          if (!tname || tname.includes('[입력')) continue;

          const schedule = {};
          days.forEach(d => { schedule[d] = {}; });

          const headerRow = rows1[headerIdx];
          for (let ci = 2; ci < r.length; ci++) {
            const hVal = (headerRow[ci] || '').toString().trim();
            if (!hVal) continue;
            const match = hVal.match(/^([월화수목금])([1-7])$/);
            if (match) {
              const d = match[1];
              const p = parseInt(match[2], 10);
              if (r[ci]) {
                schedule[d][p] = r[ci].toString().trim();
              }
            }
          }

          let homeroom = '';
          let totalHours = 0;
          const homeroomCtx = headerRow.indexOf('담임');
          const hoursCtx = headerRow.indexOf('시수');
          if (homeroomCtx !== -1 && r[homeroomCtx]) homeroom = r[homeroomCtx].toString().trim();
          if (hoursCtx !== -1 && r[hoursCtx]) totalHours = parseInt(r[hoursCtx], 10) || 0;

          teachers.push({ name: tname, schedule, homeroom, totalHours });
        }

        // 2. 내선번호 처리
        const extMap = {};
        for (let ri = 1; ri < rows2.length; ri++) {
          const r = rows2[ri];
          if (!r || !r[0]) continue;
          const name = r[0].toString().trim();
          const ext = (r[1] || '').toString().trim();
          if (!name || name.includes('[입력')) continue;
          extMap[name] = ext;
        }

        // 3. 시정표 처리
        const bellSchedule = [];
        for (let ri = 1; ri < rows3.length; ri++) {
          const r = rows3[ri];
          if (!r || !r[0]) continue;
          const period = r[0].toString().trim();
          const start = (r[1] || '').toString().trim();
          const end = (r[2] || '').toString().trim();
          if (!period || period.includes('[입력')) continue;
          bellSchedule.push({ period, start, end });
        }

        // 4. 묶음선택과목 처리
        const blockMap = {};
        for (let ri = 1; ri < rows4.length; ri++) {
          const r = rows4[ri];
          if (!r || !r[0]) continue;
          const bn = r[0].toString().trim();
          const tname = (r[1] || '').toString().trim();
          const day = (r[2] || '').toString().trim();
          const period = parseInt((r[3] || '').toString().trim(), 10);

          if (!bn || !tname || !day || isNaN(period) || bn.includes('[입력')) continue;

          if (!blockMap[bn]) blockMap[bn] = { teachers: new Set(), slots: new Set() };
          blockMap[bn].teachers.add(tname);
          blockMap[bn].slots.add(day + '|' + period);
        }

        const electiveBlocks = Object.values(blockMap).map(b => ({
          teachers: [...b.teachers],
          slots: [...b.slots].map(s => {
            const [d, p] = s.split('|');
            return { day: d, period: parseInt(p, 10) };
          })
        }));

        resolve({ teachers, extMap, bellSchedule, electiveBlocks });
      } catch (err) {
        reject(err);
      }
    };
    reader.onerror = () => reject(new Error('파일을 읽는 중 오류가 발생했습니다.'));
    reader.readAsArrayBuffer(file);
  });
}

uploadBtn.addEventListener('click', async () => {
  if (!parsedData || !currentUser) { setStatus('먼저 로그인하고 파일을 선택해주세요.', 'err'); return; }
  uploadBtn.disabled = true;
  setStatus('Firestore에 업로드 중...', 'info');
  try {
    await setDoc(doc(db, 'appdata', 'main'), { ...parsedData, updatedAt: new Date().toISOString() });
    setStatus(
      '업로드 완료!\n\n' +
      '  교사: ' + parsedData.teachers.length + '명\n' +
      '  내선번호: ' + Object.keys(parsedData.extMap).length + '건\n' +
      '  시정표: ' + parsedData.bellSchedule.length + '건\n' +
      '  묶음선택과목: ' + parsedData.electiveBlocks.length + '개 블록'
    , 'info');
  } catch (error) {
    console.error(error);
    setStatus('업로드 실패: ' + error.message, 'err');
    uploadBtn.disabled = false;
  }
});
</script>
</body>
</html>
