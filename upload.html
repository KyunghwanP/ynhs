<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>영남고 시간표 업로드 도구</title>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(reg => reg.unregister());
  });
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Malgun Gothic',sans-serif;background:#f0f4f3;color:#222;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .card{background:#fff;border-radius:12px;box-shadow:0 20px 50px -15px rgba(0,0,0,0.3);max-width:560px;width:100%;padding:36px 32px;}
  h1{font-size:18px;font-weight:900;color:#2F5D62;margin-bottom:6px;}
  .subtitle{font-size:12.5px;color:#666;margin-bottom:24px;line-height:1.6;}
  
  /* 인증 컨트롤 영역 */
  .auth-container {background:#eef2f1;border:1px solid #d3e0dd;border-radius:8px;padding:16px;margin-bottom:24px;display:flex;flex-direction:column;gap:10px;}
  .auth-row {display:flex;justify-content:space-between;align-items:center;font-size:13px;}
  .auth-status {font-weight:700;}
  .auth-status.logged-in {color:#2F5D62;}
  .auth-status.logged-out {color:#c53030;}
  .auth-btn {background:#fff;border:1px solid #b5c7c4;color:#333;padding:6px 12px;border-radius:4px;font-size:12px;font-weight:700;cursor:pointer;transition:background 0.2s;}
  .auth-btn:hover {background:#f4f7f6;}

  .step-box{background:#f8faf9;border:1px solid #e4ebe9;border-radius:8px;padding:20px;margin-bottom:20px;}
  .step-title{font-size:13px;font-weight:700;color:#2F5D62;margin-bottom:12px;display:flex;align-items:center;}
  .step-title span{background:#2F5D62;color:#fff;font-size:10px;width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-right:6px;}
  
  .btn{display:block;width:100%;background:#2F5D62;color:#fff;border:none;padding:12px;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;transition:background 0.2s;}
  .btn:hover{background:#1E3D40;}
  .btn:disabled{background:#ccc;cursor:not-allowed;}
  
  .file-label{display:block;border:2px dashed #b5c7c4;padding:24px;text-align:center;border-radius:6px;cursor:pointer;background:#fff;transition:background 0.2s;}
  .file-label:hover{background:#f0f5f4;}
  .file-label input{display:none;}
  .file-info{margin-top:8px;font-size:12px;color:#555;font-weight:700;}
  
  #status{margin-top:20px;padding:14px;border-radius:6px;font-size:12.5px;line-height:1.6;white-space:pre-wrap;display:none;}
  .status-info{background:#eaf4f5;border:1px solid #bce1e4;color:#2c5e61;}
  .status-err{background:#fdf2f2;border:1px solid #fbc4c4;color:#9b2c2c;}
</style>
</head>
<body>

<div class="card">
  <h1>영남고 시간표 데이터 업로드2</h1>
  <div class="subtitle">사용설명서 탭이 포함된 상태 그대로 업로드할 수 있습니다. 관리자 로그인 후 진행하십시오.</div>
  
  <div class="auth-container">
    <div class="auth-row">
      <div>계정 상태: <span id="authStatus" class="auth-status logged-out">확인 중...</span></div>
      <button id="loginBtn" class="auth-btn" style="display:none;">Google 로그인</button>
      <button id="logoutBtn" class="auth-btn" style="display:none;">로그아웃</button>
    </div>
  </div>

  <div class="step-box">
    <div class="step-title"><span>1</span> 엑셀 템플릿 파일 선택</div>
    <label class="file-label">
      <span style="font-size:13px;color:#666;">컴퓨터에서 파일 선택 (.xlsx)</span>
      <input type="file" id="excelFile" accept=".xlsx">
      <div class="file-info" id="fileName">선택된 파일 없음</div>
    </label>
  </div>

  <button class="btn" id="uploadBtn" disabled>Firestore에 업로드 실행</button>

  <div id="status"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 기존 시스템의 설정을 복사하여 적용해 주십시오.
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const authStatus = document.getElementById('authStatus');
const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const excelFile = document.getElementById('excelFile');
const fileName = document.getElementById('fileName');
const uploadBtn = document.getElementById('uploadBtn');
const statusDiv = document.getElementById('status');

let currentUser = null;
let parsedData = null;

function setStatus(msg, type) {
  statusDiv.style.display = 'block';
  statusDiv.className = type === 'err' ? 'status-err' : 'status-info';
  statusDiv.innerText = msg;
}

// 1. 로그인 / 로그아웃 버튼 이벤트 리스너 정의
loginBtn.addEventListener('click', async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (err) {
    console.error(err);
    setStatus(`로그인 실패: ${err.message}`, 'err');
  }
});

logoutBtn.addEventListener('click', async () => {
  try {
    await signOut(auth);
    setStatus('로그아웃되었습니다.', 'info');
  } catch (err) {
    console.error(err);
  }
});

// 2. 인증 상태 변화 추적
onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    authStatus.innerText = `${user.email} (관리자)`;
    authStatus.className = "auth-status logged-in";
    loginBtn.style.display = 'none';
    logoutBtn.style.display = 'block';
    if (parsedData) uploadBtn.disabled = false;
  } else {
    currentUser = null;
    authStatus.innerText = "로그인 되지 않음";
    authStatus.className = "auth-status logged-out";
    loginBtn.style.display = 'block';
    logoutBtn.style.display = 'none';
    uploadBtn.disabled = true;
  }
});

// 3. 엑셀 파싱 핸들러
excelFile.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  fileName.innerText = file.name;
  uploadBtn.disabled = true;
  setStatus('엑셀 데이터 구조 검증 및 정제 중...', 'info');

  try {
    parsedData = await parseExcel(file);
    setStatus(`엑셀 파싱 완료!\nFirestore 업로드 대기 중입니다.`, 'info');
    if (currentUser) uploadBtn.disabled = false;
  } catch (err) {
    console.error(err);
    parsedData = null;
    setStatus(`규격 불일치 오류:\n${err.message}`, 'err');
  }
});

function parseExcel(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, {type: 'array'});
        const sheetNames = wb.SheetNames;

        // 사용설명서 탭의 인덱스 변화를 무력화하는 명칭 기반 탭 탐색
        const tsName = sheetNames.find(n => n.includes('전체시간표'));
        const extName = sheetNames.find(n => n.includes('내선번호'));
        const bellName = sheetNames.find(n => n.includes('시정표'));
        const electiveName = sheetNames.find(n => n.includes('묶음선택과목'));

        if (!tsName) throw new Error("'전체시간표' 탭이 확인되지 않습니다.");
        if (!extName) throw new Error("'내선번호' 탭이 확인되지 않습니다.");
        if (!bellName) throw new Error("'시정표' 탭이 확인되지 않습니다.");
        if (!electiveName) throw new Error("'묶음선택과목' 탭이 확인되지 않습니다.");

        const rows1 = XLSX.utils.sheet_to_json(wb.Sheets[tsName], {header: 1});
        const rows2 = XLSX.utils.sheet_to_json(wb.Sheets[extName], {header: 1});
        const rows3 = XLSX.utils.sheet_to_json(wb.Sheets[bellName], {header: 1});
        const rows4 = XLSX.utils.sheet_to_json(wb.Sheets[electiveName], {header: 1});

        // --- [시트1: 전체시간표 처리] ---
        const teachers = [];
        let headerIdx = -1;
        for (let i = 0; i < rows1.length; i++) {
          if (rows1[i] && rows1[i].includes('교사명')) {
            headerIdx = i;
            break;
          }
        }
        if (headerIdx === -1) throw new Error("'전체시간표' 내부의 '교사명' 기준 열(Header)을 식별할 수 없습니다.");

        const days = ['월', '화', '수', '목', '금'];
        const headerRow = rows1[headerIdx];

        for (let ri = headerIdx + 1; ri < rows1.length; ri++) {
          const r = rows1[ri];
          if (!r || !r[1]) continue;

          const tname = r[1].toString().trim();
          if (!tname || tname.includes('[입력') || tname === '교사명') continue;

          const schedule = {};
          days.forEach(d => { schedule[d] = {}; });

          for (let ci = 2; ci < r.length; ci++) {
            const hVal = (headerRow[ci] || '').toString().trim();
            if (!hVal) continue;
            
            const match = hVal.match(/^([월화수목금])([1-7])$/);
            if (match) {
              const d = match[1];
              const p = parseInt(match[2], 10);
              if (r[ci] !== undefined && r[ci] !== null && r[ci] !== '') {
                schedule[d][p] = r[ci].toString().trim();
              }
            }
          }

          let homeroom = '';
          let totalHours = 0;
          const homeroomCtx = headerRow.indexOf('담임');
          const hoursCtx = headerRow.indexOf('시수');
          
          if (homeroomCtx !== -1 && r[homeroomCtx]) homeroom = r[homeroomCtx].toString().trim();
          if (hoursCtx !== -1 && r[hoursCtx]) totalHours = parseInt(r[hoursCtx], 10) || 0;

          teachers.push({ name: tname, schedule, homeroom, totalHours });
        }

        // --- [시트2: 내선번호 처리] ---
        const extMap = {};
        if (rows2) {
          rows2.forEach(r => {
            if (!r || r.length < 2) return;
            const name = (r[0] || '').toString().trim();
            const ext = (r[1] || '').toString().trim();
            if (name && ext && !name.includes('[입력') && name !== '이름') {
              extMap[name] = ext;
            }
          });
        }

        // --- [시트3: 시정표 처리] ---
        const bellSchedule = [];
        if (rows3) {
          rows3.forEach(r => {
            if (!r || r.length < 3) return;
            const period = (r[0] || '').toString().trim();
            const start = (r[1] || '').toString().trim();
            const end = (r[2] || '').toString().trim();
            if (period && start && end && !period.includes('[입력') && period !== '교시') {
              bellSchedule.push({ period, start, end });
            }
          });
        }

        // --- [시트4: 묶음선택과목 처리] ---
        const blockMap = {};
        if (rows4) {
          rows4.forEach(r => {
            if (!r || r.length < 4) return;
            const bn = (r[0] || '').toString().trim();
            const tname = (r[1] || '').toString().trim();
            const day = (r[2] || '').toString().trim();
            const period = parseInt((r[3] || '').toString().trim(), 10);

            if (!bn || !tname || !day || isNaN(period) || bn.includes('[입력') || bn === '묶음번호') return;

            if (!blockMap[bn]) {
              blockMap[bn] = { teachers: new Set(), slots: new Set() };
            }
            blockMap[bn].teachers.add(tname);
            blockMap[bn].slots.add(day + '|' + period);
          });
        }

        const electiveBlocks = Object.values(blockMap).map(b => ({
          teachers: [...b.teachers],
          slots: [...b.slots].map(s => {
            const [d, p] = s.split('|');
            return { day: d, period: parseInt(p, 10) };
          })
        }));

        resolve({ teachers, extMap, bellSchedule, electiveBlocks });
      } catch (err) {
        reject(err);
      }
    };
    reader.onerror = () => reject(new Error('파일 스트림 처리 오류'));
    reader.readAsArrayBuffer(file);
  });
}

// 4. Firestore 최종 커밋 제어
uploadBtn.addEventListener('click', async () => {
  if (!parsedData || !currentUser) { setStatus('트랜잭션 실행 실패: 인증 또는 파싱 상태 누락', 'err'); return; }
  uploadBtn.disabled = true;
  setStatus('Firestore에 최종 패키지 업로드 중...', 'info');
  try {
    await setDoc(doc(db, 'appdata', 'main'), { ...parsedData, updatedAt: new Date().toISOString() });
    setStatus(
      '동기화 및 업로드 완료!\n\n' +
      '  - 교사 데이터: ' + parsedData.teachers.length + '명 등록\n' +
      '  - 내선 번호부: ' + Object.keys(parsedData.extMap).length + '건 처리\n' +
      '  - 시정 계획표: ' + parsedData.bellSchedule.length + '개 교시 세팅\n' +
      '  - 묶음 연동 정보: ' + parsedData.electiveBlocks.length + '개 블록 갱신'
    , 'info');
  } catch (error) {
    console.error(error);
    setStatus('서버 쓰기 에러 발생:\n' + error.message, 'err');
    uploadBtn.disabled = false;
  }
});
</script>
</body>
</html>
