// 아바타 색상 - 부서별로 다른 색
const AVATAR_COLORS = ['#8C2F39','#2F5D62','#B08D57','#3B5170','#6B7A3A','#5D4037','#546E7A'];
function avatarColor(dept) {
  let hash = 0;
  for (const c of (dept||'')) hash = (hash * 31 + c.charCodeAt(0)) & 0xFFFFFF;
  return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
}

function renderContacts(contacts) {
  const list = document.getElementById('contactsList');
  if (!contacts.length) {
    list.innerHTML = '<div class="contacts-empty">검색 결과가 없습니다.</div>';
    return;
  }
  // 파일 순서 그대로, 부서 그룹 없이 나열
  let html = contacts.map((c, idx) => {
    const color = avatarColor(c.dept);
    const initial = c.name ? c.name[0] : '?';
    // 휴대폰: 전화 + 문자 아이콘
    const phoneNum = c.phone ? c.phone.replace(/-/g,'') : '';
    const phoneBtn = phoneNum
      ? `<a class="contact-btn phone" href="tel:${phoneNum}" title="전화걸기">📞</a>
         <a class="contact-btn sms" href="sms:${phoneNum}" title="문자보내기">💬</a>`
      : '';
    // 내선: 053-235-#### 형태로 변환해서 클릭 시 전화 연결
    const extNum = c.ext ? '053235' + String(c.ext).replace(/-/g,'').slice(-4) : '';
    const extBtn = c.ext
      ? `<a class="contact-btn ext" href="tel:${extNum}" title="내선 ${c.ext}">☎</a>`
      : '';
    return `
      <div class="contact-card">
        <div class="contact-avatar" style="background:${color}" data-idx="${idx}">${initial}</div>
        <div class="contact-info" data-idx="${idx}" style="cursor:pointer;">
          <div class="contact-name">${c.name}${c.role ? ' <span style="font-size:11px;font-weight:400;color:var(--ink-soft);">'+c.role+'</span>' : ''}</div>
          <div class="contact-dept">${c.dept||''}${c.subject ? ' · '+c.subject : ''}</div>
        </div>
        <div class="contact-actions">${phoneBtn}${extBtn}</div>
      </div>`;
  }).join('');
  list.innerHTML = html;

  // 이름/아바타 클릭 → 상세 팝업
  list.querySelectorAll('[data-idx]').forEach(el => {
    el.addEventListener('click', () => {
      const c = contacts[parseInt(el.dataset.idx)];
      showContactDetail(c);
    });
  });
}

// 상세 팝업
function showContactDetail(c) {
  const color = avatarColor(c.dept);
  const rows = [
    ['담당 부서', c.dept],
    ['담당 과목', c.subject],
    ['직위',     c.role],
  ].filter(r => r[1]).map(([label, val]) => `
    <div class="cd-row">
      <span class="cd-label">${label}</span>
      <span class="cd-value">${val}</span>
    </div>`).join('');

  const phoneNum = c.phone ? c.phone.replace(/-/g,'') : '';
  const extNum   = c.ext   ? '053235' + String(c.ext).replace(/-/g,'').slice(-4) : '';
  const extFormatted = c.ext ? '053-235-' + String(c.ext).slice(-4) : '';

  const phoneRow = phoneNum ? `
    <div class="cd-row">
      <span class="cd-label">휴대폰</span>
      <div class="cd-action-btns">
        <a class="cd-phone-btn" href="tel:${phoneNum}">📞 전화</a>
        <a class="cd-phone-btn sms" href="sms:${phoneNum}">💬 문자</a>
      </div>
    </div>` : '';

  const extRow = extNum ? `
    <div class="cd-row">
      <span class="cd-label">내선전화</span>
      <div class="cd-action-btns">
        <span class="cd-value">${extFormatted}</span>
        <a class="cd-phone-btn ext" href="tel:${extNum}">☎ 연결</a>
      </div>
    </div>` : '';

  const overlay = document.createElement('div');
  overlay.className = 'cd-overlay';
  overlay.innerHTML = `
    <div class="cd-box">
      <div class="cd-header" style="background:${color}">
        <div class="cd-avatar">${c.name[0]}</div>
        <div>
          <div class="cd-name">${c.name}</div>
          <div class="cd-dept">${c.dept||''}</div>
        </div>
        <button class="cd-close">×</button>
      </div>
      <div class="cd-body">
        ${rows}
        ${phoneRow}
        ${extRow}
      </div>
    </div>`;

  document.body.appendChild(overlay);
  requestAnimationFrame(() => overlay.classList.add('open'));

  const close = () => {
    overlay.classList.remove('open');
    setTimeout(() => overlay.remove(), 200);
  };
  overlay.querySelector('.cd-close').addEventListener('click', close);
  overlay.addEventListener('click', e => { if(e.target === overlay) close(); });
}

// 검색
document.getElementById('contactsSearch').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { renderContacts(allContacts); return; }
  const filtered = allContacts.filter(c =>
    (c.name||'').toLowerCase().includes(q) ||
    (c.dept||'').toLowerCase().includes(q) ||
    (c.subject||'').toLowerCase().includes(q) ||
    (c.role||'').toLowerCase().includes(q)
  );
  renderContacts(filtered);
});
